<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Biomas GeoJSON</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        #map { width: 100%; height: 60vh; }
        #debug { background: #f5f5f5; padding: 20px; height: 40vh; overflow-y: auto; font-size: 12px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="debug"><strong>Carregando GeoJSON...</strong></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const map = L.map('map', { center: [-14.2, -51.9], zoom: 4 });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const debugDiv = document.getElementById('debug');
let debugText = '';

// Carrega GeoJSON
fetch('biomas_brasil.geojson')
    .then(r => r.json())
    .then(data => {
        debugText += `\n✅ GeoJSON carregado: ${data.features.length} features\n`;
        debugText += `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        // Inspecionar a primeira feature
        if (data.features.length > 0) {
            const firstFeature = data.features[0];
            debugText += `\n📍 PRIMEIRA FEATURE:\n`;
            debugText += `Propriedades: ${JSON.stringify(firstFeature.properties, null, 2)}\n`;
        }
        
        // Inspecionar todas as chaves de propriedades
        const allKeys = new Set();
        data.features.forEach(f => {
            Object.keys(f.properties).forEach(k => allKeys.add(k));
        });
        
        debugText += `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        debugText += `\n🔑 TODAS AS CHAVES DE PROPRIEDADES:\n`;
        debugText += Array.from(allKeys).join(', ') + '\n';
        
        // Lista todos os biomas encontrados
        debugText += `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        debugText += `\n📋 TODOS OS BIOMAS (por chave "name"):\n`;
        const biomesSet = new Set();
        data.features.forEach((f, idx) => {
            const name = f.properties.name || f.properties.name_bioma || 'SEM NOME';
            biomesSet.add(name);
            if (idx < 3) debugText += `  ${idx}: "${name}"\n`;
        });
        debugText += `  ...\n\n  Total único: ${biomesSet.size}\n`;
        debugText += `  Nomes: ${Array.from(biomesSet).join(', ')}\n`;
        
        // Atualizar debug display
        debugDiv.textContent = debugText;
        
        // Adicionar ao mapa com cores
        L.geoJSON(data, {
            style: f => {
                const biomeName = f.properties.name || f.properties.name_bioma || '';
                const BIOME_COLOR = {
                    'Amazônia': '#2E7D32',
                    'Cerrado': '#795548',
                    'Mata Atlântica': '#1B5E20',
                    'Caatinga': '#E65100',
                    'Pantanal': '#01579B',
                    'Pampa': '#33691E'
                };
                const color = BIOME_COLOR[biomeName] || '#999';
                return {
                    fillColor: color,
                    fillOpacity: 0.3,
                    color: color,
                    weight: 2,
                    opacity: 0.8
                };
            },
            onEachFeature: (f, l) => {
                const biomeName = f.properties.name || f.properties.name_bioma || 'DESCONHECIDO';
                l.bindPopup(`<strong>${biomeName}</strong><br><small>${JSON.stringify(f.properties).slice(0, 100)}...</small>`);
            }
        }).addTo(map);
    })
    .catch(err => {
        debugDiv.textContent = `❌ ERRO: ${err.message}`;
        console.error(err);
    });
</script>
</body>
</html>
